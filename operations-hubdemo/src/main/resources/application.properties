spring.application.name=operations-hub

# Database Configuration
# Defaults to a local H2 database so the app can start without a separate MySQL server.
# You can still override these with environment variables for MySQL or another database.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/operations-hub;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
app.seed.enabled=false

# Port
server.port=8080
