spring.application.name=operations-hub

# Database Configuration
# Override these env vars when you want to use another database or credentials.
# By default the app uses an embedded H2 database so it can boot without a local MySQL server.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.data/operations-hub;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.seed.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB

# Port
server.port=8080
