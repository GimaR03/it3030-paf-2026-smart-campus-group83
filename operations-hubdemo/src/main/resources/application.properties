spring.application.name=operations-hub

# Default profile so the backend can start without requiring a local MySQL setup.
spring.profiles.default=local

# Database Configuration
# Defaults to embedded H2 so the backend can run even when MySQL is not running locally.
# Override these env vars when you want to use MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.data/operations-hub;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.seed.enabled=${APP_SEED_ENABLED:true}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB

# Port
server.port=8080
